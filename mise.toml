[tools]
# Pinned for reproducibility: CI and local must use identical versions.
# esqlite (a native rebar3/C NIF dep) is the reason rebar3 is required here.
gleam = "1.16.0"
erlang = "28.3.1"
rebar = "3.27.0"

[tasks.format]
description = "Check formatting"
run = "gleam format --check"

[tasks.check]
description = "Type-check the project"
run = "gleam check"

[tasks.lint]
description = "Lint with glinter"
run = "gleam run -m glinter"

[tasks.test]
description = "Run tests"
run = "gleam test"

[tasks.gen]
description = "Regenerate Parrot SQL codegen + copy schema to priv/"
run = """
rm -f /tmp/feedreader_gen.db
sqlite3 /tmp/feedreader_gen.db < src/feedreader/sql/schema.sql
gleam run -m parrot -- --sqlite /tmp/feedreader_gen.db
rm -f /tmp/feedreader_gen.db
cp src/feedreader/sql/schema.sql priv/schema.sql
"""

[tasks."assets:install"]
description = "Install TailwindCSS CLI binary (via glailglind)"
run = "gleam run -m tailwind/install"

[tasks."assets:build"]
description = "Compile TailwindCSS to app.compiled.css (via glailglind)"
run = "gleam run -m tailwind/run"

[tasks.assets]
description = "Install + build assets"
depends = ["assets:install", "assets:build"]

[tasks.pre-commit]
description = "Run all checks before committing"
depends = ["format", "check", "lint", "test"]
